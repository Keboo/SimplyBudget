name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'SimplyBudget.Api/**'
      - 'SimplyBudget.Data/**'
      - 'SimplyBudget.ServiceDefaults/**'
      - 'SimplyBudget.AppHost/**'
      - 'SimplyBudget.Api.Tests/**'
      - 'SimplyBudget.Web/**'
      - 'SimplyBudgetShared/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'SimplyBudget.Api/**'
      - 'SimplyBudget.Data/**'
      - 'SimplyBudget.ServiceDefaults/**'
      - 'SimplyBudget.Web/**'
      - 'SimplyBudgetShared/**'

env:
  REGISTRY: keboodevacr.azurecr.io
  IMAGE_NAME: simplybudget-api
  CONTAINER_APP_NAME: simplybudget-api
  CONTAINER_APP_RG: SimplyBudget

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SimplyBudget.WebApi.slnf

      - name: Build
        run: dotnet build SimplyBudget.WebApi.slnf --no-restore --configuration Release

      - name: Test
        run: dotnet test SimplyBudget.WebApi.slnf --no-build --configuration Release

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SimplyBudget.Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: SimplyBudget.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ''

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: SimplyBudget.Web/dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-and-test, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Backend: Docker build & push ────────────────────────────────────────
      - name: ACR Login
        run: az acr login --name keboodevacr

      - name: Set image tag
        id: image_tag
        run: echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Docker Build & Push
        run: |
          docker build \
            -f SimplyBudget.Api/Dockerfile \
            -t ${{ steps.image_tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ steps.image_tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.CONTAINER_APP_RG }} \
            --image ${{ steps.image_tag.outputs.tag }}

      # ── Frontend: Deploy to Static Web App ──────────────────────────────────
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: SimplyBudget.Web/dist/

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: 'SimplyBudget.Web/dist'
          skip_app_build: true
